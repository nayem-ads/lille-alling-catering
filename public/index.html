  <!-- ===== Hero video (Higgsfield — injected after generation) ===== -->
  <style>
    /* Hero video background */
    .lae-hero-video-bg {
      position: absolute; inset: 0; z-index: 0;
      overflow: hidden; pointer-events: none;
    }
    .lae-hero-video-bg video {
      width: 100%; height: 100%; object-fit: cover;
      opacity: 0.38; filter: saturate(1.1) brightness(0.92);
    }
    .lae-hero-video-bg::after {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(135deg,
        color-mix(in srgb, var(--bg) 62%, transparent) 0%,
        color-mix(in srgb, var(--bg) 22%, transparent) 55%,
        transparent 100%);
    }

    /* Real image in hero collage tiles */
    .lae-collage-img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      border-radius: var(--r-md);
    }

    /* Menu card real photos */
    .lae-menu-card__real-img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform .6s cubic-bezier(.2,.7,.2,1);
    }
    .lae-menu-card:hover .lae-menu-card__real-img { transform: scale(1.06); }
  </style>
</head>
<body>
  <a href="#menus" style="position:absolute;left:-9999px;top:0;background:#271F18;color:#fff;padding:10px 16px;border-radius:8px;z-index:999"
